services:
  traefik:
    image: traefik:v3.0
    container_name: traefik-main
    restart: unless-stopped
    ports:
      - "3005:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedByDefault=true
      - --entrypoints.web.address=:80

  upixel:
    image: node:20-alpine
    container_name: upixel-app
    working_dir: /app
    volumes:
      - /opt/upixel/app:/app
      - /app/node_modules
    command: sh -c "npm install && npm run build && npm run preview -- --host --port 4173"
    labels:
      - traefik.http.routers.upixel.rule=PathPrefix(`/upixel`)
      - traefik.http.services.upixel.loadbalancer.server.port=4173
      - traefik.http.middlewares.upixel-strip.stripprefix.prefixes=/upixel
      - traefik.http.routers.upixel.middlewares=upixel-strip
