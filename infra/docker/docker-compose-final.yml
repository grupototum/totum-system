services:
  traefik:
    image: traefik:v3.0
    container_name: traefik-grupototum
    restart: unless-stopped
    ports:
      - "3005:80"
      - "3443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedByDefault=true
      - --entrypoints.web.address=:80

  upixel:
    image: node:20-alpine
    container_name: upixel-grupototum
    working_dir: /app
    volumes:
      - /opt/upixel/app:/app
      - /app/node_modules
    command: sh -c "npm install && npm run build && npm run preview -- --host --port 4173"
    labels:
      - traefik.enable=true
      - traefik.http.routers.upixel.rule=PathPrefix(`/upixel`)
      - traefik.http.services.upixel.loadbalancer.server.port=4173

  totum:
    image: node:20-alpine
    container_name: totum-grupototum
    working_dir: /app
    volumes:
      - /opt/totum-system/app:/app
      - /app/node_modules
    command: sh -c "npm install && npm run build && npm run preview -- --host --port 4173"
    labels:
      - traefik.enable=true
      - traefik.http.routers.totum.rule=PathPrefix(`/totum`)
      - traefik.http.services.totum.loadbalancer.server.port=4173

  api:
    image: node:20-alpine
    container_name: api-grupototum
    working_dir: /app
    volumes:
      - /opt/stark-api:/app
      - /app/node_modules
    command: sh -c "npm install && npm start"
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=PathPrefix(`/api`)
      - traefik.http.services.api.loadbalancer.server.port=3000

  landing:
    image: nginx:alpine
    container_name: landing-grupototum
    volumes:
      - /opt/traefik/landing:/usr/share/nginx/html:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.landing.rule=PathPrefix(`/`)
      - traefik.http.services.landing.loadbalancer.server.port=80
