services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedByDefault=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443

  upixel:
    image: node:20-alpine
    container_name: upixel
    working_dir: /app
    volumes:
      - /opt/upixel/app:/app
      - /app/node_modules
    command: sh -c "npm install && npm run build && npm run preview -- --host --port 4173"
    labels:
      - traefik.http.routers.upixel.rule=PathPrefix(`/upixel`)
      - traefik.http.services.upixel.loadbalancer.server.port=4173
