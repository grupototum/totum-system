    <link rel="preload" as="image" href="/logo-red.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.cdnfonts.com" />

    <!-- Geomanist — carregamento assíncrono (não bloqueia renderização) -->
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/geomanist" media="print" onload="this.media='all'" />
    <!-- Inter — carregamento assíncrono com font-display:swap -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/geomanist" />
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap" />
    </noscript>
    <script>
      (function(){
        var t=localStorage.getItem('totum-theme');
        var d=(t==='dark'||(t!=='light'&&window.matchMedia('(prefers-color-scheme:dark)').matches));
        document.documentElement.classList.add(d?'dark':'light');
        if(d)document.documentElement.style.background='#1a1714';
      })();
    </script>
